name: Build & Release

on:
  push:
    paths:
      - "WiFiLens/**"
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    paths:
      - "WiFiLens/**"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: WiFiLens
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: WiFiLens
    steps:
      - uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild -project WiFiLens.xcodeproj \
            -scheme WiFiLens \
            -configuration Release \
            -derivedDataPath .build/DerivedData \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            build

      - name: Discover App
        run: |
          APP_PATH=$(find .build/DerivedData/Build/Products/Release -maxdepth 1 -name "*.app" | head -1)
          APP_NAME=$(basename "$APP_PATH" .app)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: Prepare App Bundle
        run: |
          cp -R "$APP_PATH" "$APP_NAME.app"

      - name: Create DMG
        run: |
          hdiutil create -volname "$APP_NAME" \
            -srcfolder "$APP_NAME.app" \
            -ov -format UDZO "$APP_NAME.dmg"
          echo "DMG_SIZE=$(stat -f%z "$APP_NAME.dmg")" >> $GITHUB_ENV

      - name: Get Version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$TAG" >> $GITHUB_ENV
          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$APP_NAME.app/Contents/Info.plist" 2>/dev/null || echo "$TAG")
          echo "BUNDLE_VERSION=$BUNDLE_VERSION" >> $GITHUB_ENV

      - name: Generate Appcast
        run: |
          ENCODED_DMG=$(printf '%s' "$APP_NAME.dmg" | sed 's/ /%20/g')
          ENCLOSURE_URL="https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/${ENCODED_DMG}"
          VER="${{ env.VERSION }}"
          BVER="${{ env.BUNDLE_VERSION }}"
          SIZE="${{ env.DMG_SIZE }}"

          echo '<?xml version="1.0" encoding="utf-8"?>' > appcast.xml
          echo '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">' >> appcast.xml
          echo '  <channel>' >> appcast.xml
          echo "    <title>${APP_NAME}</title>" >> appcast.xml
          echo '    <item>' >> appcast.xml
          echo "      <title>Version ${VER}</title>" >> appcast.xml
          echo "      <sparkle:version>${VER}</sparkle:version>" >> appcast.xml
          echo "      <sparkle:shortVersionString>${BVER}</sparkle:shortVersionString>" >> appcast.xml
          echo '      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>' >> appcast.xml
          echo "      <enclosure url=\"${ENCLOSURE_URL}\"" >> appcast.xml
          echo "                 sparkle:version=\"${VER}\"" >> appcast.xml
          echo "                 sparkle:shortVersionString=\"${BVER}\"" >> appcast.xml
          echo "                 length=\"${SIZE}\"" >> appcast.xml
          echo '                 type="application/octet-stream" />' >> appcast.xml
          echo '    </item>' >> appcast.xml
          echo '  </channel>' >> appcast.xml
          echo '</rss>' >> appcast.xml

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            WiFiLens/${{ env.APP_NAME }}.dmg
            WiFiLens/appcast.xml
          draft: false
          generate_release_notes: true
