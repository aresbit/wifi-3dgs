name: Swift CI

on:
  push:
    paths:
      - 'TinyWiFiAnalyzer/**'
  pull_request:
    paths:
      - 'TinyWiFiAnalyzer/**'

jobs:
  build-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: TinyWiFiAnalyzer
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test
